# Shared infrastructure only — the cross-context message bus (NATS).
# Context-owned infrastructure (databases, volumes, …) lives in
# projects/<context>/docker-compose.yml, one compose project per context.
name: rust-point-shared

services:
  nats:
    image: nats:2.14.3-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data

volumes:
  natsdata:
