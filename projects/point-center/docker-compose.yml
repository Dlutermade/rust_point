# point-center owned infrastructure (its database).
# Shared infrastructure (NATS message bus) lives in the repo-root docker-compose.yml.
name: point-center

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: point_center
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18 映像的掛載點是 /var/lib/postgresql(PGDATA 落在版本子目錄,
      # 為 pg_upgrade 保留);掛在舊的 /data 會被映像拒絕啟動。
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d point_center"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
