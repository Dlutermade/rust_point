# point-center owned infrastructure (its database).
# Shared infrastructure (NATS message bus) lives in the repo-root docker-compose.yml.
name: point-center

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: point_center
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d point_center"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
